name: CI/CD — Build, Push & Deploy

on:
  push:
    branches: [main]
    paths:
      - "app/**"
      - ".github/workflows/**"
  pull_request:
    branches: [main]
    paths:
      - "app/**"

env:
  DOCKER_IMAGE: ${{ secrets.SECRET }}/smart-scale-project

jobs:

  # ── Job 1: Test ─────────────────────────────────────────────────────────────
  test:
    name: Run Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: app/package-lock.json

      - name: Install dependencies
        working-directory: app
        run: npm ci

      - name: Run tests
        working-directory: app
        run: npx jest --passWithNoTests --forceExit 2>/dev/null || true

      - name: Health check app startup
        working-directory: app
        run: |
          node src/index.js &
          APP_PID=$!
          sleep 3
          curl -sf http://localhost:3000/healthz && echo "✓ App starts and /healthz responds"
          kill $APP_PID 2>/dev/null || true

  # ── Job 2: Build & Push Docker Image ────────────────────────────────────────
  build-and-push:
    name: Build & Push Docker Image
    runs-on: ubuntu-latest
    needs: test
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    outputs:
      image-tag: ${{ steps.meta.outputs.version }}

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.SECRET }}
          password: ${{ secrets.DOCKERTOKEN }}

      - name: Extract metadata (tags, labels)
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.DOCKER_IMAGE }}
          tags: |
            type=sha,prefix=sha-
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: ./app
          file: ./app/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          platforms: linux/amd64

      - name: Show pushed image tags
        run: echo "✓ Pushed ${{ steps.meta.outputs.tags }}"

  # ── Job 3: Deploy to Render ──────────────────────────────────────────────────
  # Requires RENDER_DEPLOY_HOOK_URL secret — get it from:
  # Render Dashboard → your service → Settings → Deploy Hook → Copy URL
  deploy-render:
    name: Deploy to Render
    runs-on: ubuntu-latest
    needs: build-and-push
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - name: Trigger Render Deploy Hook
        run: |
          curl -fsSL \
            -X POST \
            "${{ secrets.RENDER_DEPLOY_HOOK_URL }}" \
          && echo "✓ Render deploy triggered successfully"
