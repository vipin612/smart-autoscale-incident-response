apiVersion: apps/v1
kind: Deployment
metadata:
  name: smartscale-app
  namespace: smartscale
  labels:
    app: smartscale-app
    version: "1.0.0"
    managed-by: kubectl
spec:
  replicas: 2
  selector:
    matchLabels:
      app: smartscale-app
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0          # Zero-downtime deploy
  template:
    metadata:
      labels:
        app: smartscale-app
        version: "1.0.0"
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "3000"
        prometheus.io/path: "/metrics"
    spec:
      # Graceful shutdown window
      terminationGracePeriodSeconds: 30

      containers:
        - name: smartscale-app
          image: vipinsharma001/smart-scale-project:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 3000
              name: http
              protocol: TCP

          env:
            - name: NODE_ENV
              value: "production"
            - name: PORT
              value: "3000"
            - name: HOSTNAME
              valueFrom:
                fieldRef:
                  fieldPath: metadata.name

          # Resource limits — critical for HPA to work
          resources:
            requests:
              cpu: "100m"         # 0.1 CPU core
              memory: "128Mi"
            limits:
              cpu: "500m"         # 0.5 CPU core
              memory: "256Mi"

          # Liveness: restart if app is stuck/deadlocked
          livenessProbe:
            httpGet:
              path: /healthz
              port: 3000
            initialDelaySeconds: 15
            periodSeconds: 20
            failureThreshold: 3
            timeoutSeconds: 5

          # Readiness: don't send traffic until truly ready
          readinessProbe:
            httpGet:
              path: /ready
              port: 3000
            initialDelaySeconds: 5
            periodSeconds: 10
            failureThreshold: 3
            timeoutSeconds: 3

      # Spread pods across nodes for HA
      topologySpreadConstraints:
        - maxSkew: 1
          topologyKey: kubernetes.io/hostname
          whenUnsatisfiable: DoNotSchedule
          labelSelector:
            matchLabels:
              app: smartscale-app
