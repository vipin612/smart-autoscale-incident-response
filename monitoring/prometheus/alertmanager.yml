global:
  resolve_timeout: 5m

# Routing tree
route:
  group_by: ["alertname", "namespace"]
  group_wait: 30s
  group_interval: 5m
  repeat_interval: 4h
  receiver: "default-webhook"

  routes:
    - match:
        severity: critical
      receiver: "critical-webhook"
      group_wait: 0s
      repeat_interval: 1h

    - match:
        severity: warning
      receiver: "default-webhook"
      repeat_interval: 4h

receivers:
  - name: "default-webhook"
    webhook_configs:
      - url: "http://alertwebhook:5001/alerts"
        send_resolved: true

  - name: "critical-webhook"
    webhook_configs:
      - url: "http://alertwebhook:5001/alerts/critical"
        send_resolved: true

inhibit_rules:
  - source_match:
      severity: critical
      alertname: AppDown
    target_match_re:
      severity: warning|info
    equal: ["namespace"]
